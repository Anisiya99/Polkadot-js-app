- hosts: web
  gather_facts: no
  become: true

  tasks:
    - name: Install Docker
      yum:
        name: docker
        state: present

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: true

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: yes

    - name: Pull Docker image
      command: docker pull anisiya99/polkadot-app:latest

    - name: Stop old container
      command: docker stop app
      ignore_errors: yes

    - name: Remove old container
      command: docker rm app
      ignore_errors: yes

    - name: Run container
      command: docker run -d -p 3000:3000 --name app anisiya99/polkadot-app:latest
