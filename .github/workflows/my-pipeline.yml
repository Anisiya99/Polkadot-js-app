name: My Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Yarn
        run: npm install -g yarn

      - name: Install Dependencies
        run: yarn install

      - name: Build App
        run: yarn build

      - name: Docker Login
        if: github.event_name == 'push'
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        if: github.event_name == 'push'
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/polkadot-app:latest -f docker/Dockerfile .

      - name: Push Docker Image
        if: github.event_name == 'push'
        run: docker push ${{ secrets.DOCKER_USERNAME }}/polkadot-app:latest

      # Configure SSH key for Ansible
      - name: Configure SSH key
        if: github.event_name == 'push'
        run: |
          echo "${{ secrets.EC2_KEY }}" > key.pem
          chmod 600 key.pem

      # Run Ansible Playbook (already installed on your EC2/local machine)
      - name: Deploy with Ansible
        if: github.event_name == 'push'
        run: ansible-playbook -i ansible/inventory.ini ansible/playbook.yml \
              --private-key key.pem -u ${{ secrets.EC2_USER }}
